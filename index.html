<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viaje a Roma + Costa Amalfitana</title>

  <!-- Leaflet (mapa) por CDN -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__title">
      <h1 id="tituloViaje">Viaje</h1>
      <span id="fechasViaje" class="topbar__dates"></span>
    </div>
    <div class="topbar__actions">
      <button id="btnEdicion" class="btn btn--ghost" title="Activar modo edición">✏️ Editar</button>
      <button id="btnExportar" class="btn btn--ghost" title="Descargar tu itinerario">⬇️ Exportar</button>
      <button id="btnImportar" class="btn btn--ghost" title="Cargar un itinerario">⬆️ Importar</button>
      <button id="btnReset" class="btn btn--ghost" title="Volver al itinerario base">↺ Restaurar</button>
      <input type="file" id="inputImportar" accept="application/json,.json" hidden />
    </div>
  </header>

  <div class="filtros">
    <div class="filtros__zonas" id="filtrosZona"></div>
    <div class="filtros__dias" id="filtrosDia"></div>
    <label class="filtros__rutas">
      <input type="checkbox" id="toggleRutas" checked /> Mostrar rutas
    </label>
  </div>

  <main class="layout">
    <aside class="panel" id="panel"></aside>
    <section class="map-wrap">
      <div id="map"></div>
      <div id="pickBanner" class="pick-banner" hidden>
        📍 Haz clic en el mapa para fijar la ubicación
        <button id="pickCancel" class="btn btn--mini">Cancelar</button>
      </div>
    </section>
  </main>

  <!-- Botón flotante para pedir un cambio -->
  <button id="fabPedir" class="fab" title="Pedir un cambio a Claude">💬 Pedir un cambio</button>

  <!-- Modal: pedir un cambio (lo recibe Claude) -->
  <div class="modal" id="modalPeticion" hidden>
    <div class="modal__box">
      <h2>💬 Pedir un cambio</h2>
      <p class="modal__hint">Escribe qué quieres cambiar del viaje y se lo enviamos a Claude. La web se actualizará sola en ~1 minuto.</p>
      <form id="formPeticion" class="form">
        <label>Tu nombre <span class="opcional">(opcional)</span>
          <input type="text" name="nombre" placeholder="Ej. Laura" />
        </label>
        <label>¿Qué quieres cambiar?
          <textarea name="peticion" rows="4" required
            placeholder="Ej.: En el día 5 (Positano) cambia la cena por una pizzería con vistas y ponla a las 21:30."></textarea>
        </label>
        <p class="modal__hint" id="peticionAviso"></p>
        <div class="modal__actions">
          <button type="button" id="btnCancelarPeticion" class="btn btn--ghost">Cancelar</button>
          <button type="submit" class="btn btn--primary">Enviar petición</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal para añadir / editar parada -->
  <div class="modal" id="modalParada" hidden>
    <div class="modal__box">
      <h2 id="modalTitulo">Nueva parada</h2>
      <form id="formParada" class="form">
        <label>Nombre<input type="text" name="nombre" required /></label>
        <label>Tipo
          <select name="tipo">
            <option value="monumento">🏛️ Monumento</option>
            <option value="museo">🖼️ Museo</option>
            <option value="iglesia">⛪ Iglesia</option>
            <option value="comida">🍝 Comida</option>
            <option value="playa">🏖️ Playa</option>
            <option value="mirador">🌅 Mirador</option>
            <option value="naturaleza">🥾 Naturaleza</option>
            <option value="pueblo">🏘️ Pueblo</option>
            <option value="traslado">🚆 Traslado</option>
            <option value="alojamiento">🏨 Alojamiento</option>
          </select>
        </label>
        <div class="form__row">
          <label>Hora<input type="text" name="hora" placeholder="09:00" /></label>
          <label>Duración<input type="text" name="duracion" placeholder="1h30" /></label>
        </div>
        <label>Precio<input type="text" name="precio" placeholder="18 € / Gratis / ~30 €/pers." /></label>
        <label>Qué ver<textarea name="queVer" rows="2"></textarea></label>
        <label>Cómo llegar<input type="text" name="comoLlegar" /></label>
        <label>Notas<textarea name="notas" rows="2"></textarea></label>
        <label>Enlace<input type="url" name="enlace" placeholder="https://..." /></label>
        <div class="form__row">
          <label>Latitud<input type="number" step="any" name="lat" required /></label>
          <label>Longitud<input type="number" step="any" name="lng" required /></label>
        </div>
        <button type="button" id="btnPickMapa" class="btn btn--ghost">📍 Fijar en el mapa</button>
        <div class="modal__actions">
          <button type="button" id="btnCancelarModal" class="btn btn--ghost">Cancelar</button>
          <button type="submit" class="btn btn--primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
